project:
  title:        "Ford Thunderbird Rearlights Controller"
  author:       "Juan Fernando Posso & Pierina Miraba"
  discord:      "" 
  description:  "The circuit implements a sequential rear-light controller inspired by the Ford Thunderbird, using a 2-bit counter to generate timing states. A controller and decoders convert these states into progressive left and right light patterns based on the input signal."
  language:     "Verilog"
  clock_hz:     1.5

  tiles: "1x1"

  top_module:  "tt_um_example"

  source_files:
    - "project.v"
    - "thunderbird.v"

pinout:
  # Inputs
  ui[0]: "blinker[0]"
  ui[1]: "blinker[1]"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "left[0]"
  uo[1]: "left[1]"
  uo[2]: "left[2]"
  uo[3]: "right[0]"
  uo[4]: "right[1]"
  uo[5]: "right[2]"
  uo[6]: ""
  uo[7]: ""

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

